services:
  - type: web
    name: smartroute-backend
    env: node
    rootDir: SmartRoute_backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
